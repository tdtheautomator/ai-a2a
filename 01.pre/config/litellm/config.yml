      api_key: "not-needed"

router_settings:
  redis_host: "redis"
  redis_port: 6379
  enable_cooldowns: false
  num_retries: 3
  timeout: 60

litellm_settings:
  drop_params: true
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]
  cache: true
  cache_control: false
  cache_responses: true
  cache_params:
    type: "redis"
    host: "redis"
    port: "6379"
    db: 0
    ttl: 3600
    supported_call_types:
      - acompletion
      - completion
      - atext_completion

general_settings:
  master_key: "sk-1234"
  log_level: "debug"
  require_api_key: false
  mock_response: false
  user_api_key_cache_ttl: 3600