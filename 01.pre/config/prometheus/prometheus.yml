# ==================== Prometheus Configuration for Monitoring ====================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'demo'
    environment: 'development'

# ==================== Alertmanager Configuration ====================
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# ==================== Rule Files ====================
rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # ==================== Prometheus Self-Monitoring ====================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s

  # ==================== Redis Monitoring ====================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # ==================== LiteLLM Monitoring ====================
  - job_name: 'litellm'
    static_configs:
      - targets: ['litellm:4000']


  # ==================== PostgreSQL Exporter (Agent Metrics) ====================
  - job_name: 'postgres-agent-metrics'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s
    metrics_path: '/metrics'
    metric_relabel_configs:
      # Only scrape agent_metrics schema views
      - source_labels: [__name__]
        regex: 'pg_stat_.*|pg_database.*|pg_replication.*'
        action: drop

  # ==================== PostgreSQL Exporter (General) ====================
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 60s
    metrics_path: '/metrics'

  # ==================== Solace Metrics ====================
  - job_name: 'solace'
    static_configs:
      - targets: ['solace-exporter:9628']
    scrape_interval: 30s
    metrics_path: '/metrics'
